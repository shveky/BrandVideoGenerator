<?xml version="1.0" encoding="UTF-8"?>
<!-- Sailing-app themed showcase: stylized phone mockup of the sailing trip planner -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5a8a" />
      <stop offset="100%" stop-color="#0a3d62" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9c46a" />
      <stop offset="100%" stop-color="#f4d06f" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3" />
      <stop offset="100%" stop-color="#f5ecd6" />
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sea)" />

  <!-- Phone frame -->
  <rect x="660" y="100" width="600" height="880" rx="48" fill="#0B0B0B" />
  <rect x="680" y="120" width="560" height="840" rx="36" fill="#fdf6e3" />

  <!-- Header -->
  <rect x="680" y="120" width="560" height="80" fill="#0a3d62" />
  <text x="960" y="170" font-family="Heebo, sans-serif" font-size="26" font-weight="700"
        text-anchor="middle" fill="#fdf6e3" direction="rtl">⛵ שייט ביוון 2026</text>

  <!-- Mini map -->
  <rect x="700" y="220" width="520" height="220" rx="14" fill="#a8d0e8" />
  <path d="M 750 280 Q 800 260 820 290 Q 830 330 790 350 Q 740 340 750 280 Z" fill="#2a7a4a" />
  <path d="M 870 320 Q 920 310 930 350 Q 920 390 880 395 Q 850 380 870 320 Z" fill="#2a7a4a" />
  <path d="M 1000 290 Q 1080 270 1110 310 Q 1120 380 1050 400 Q 990 380 1000 290 Z" fill="#2a7a4a" />
  <path d="M 1130 350 Q 1170 340 1180 370 Q 1170 400 1140 405 Q 1110 390 1130 350 Z" fill="#2a7a4a" />
  <path d="M 780 320 L 900 360 L 1050 340 L 1150 380" stroke="#e76f51" stroke-width="3" fill="none" stroke-dasharray="6,4" />
  <circle cx="780" cy="320" r="18" fill="#0a3d62" /><text x="780" y="327" font-family="Heebo" font-size="18" font-weight="800" fill="#fdf6e3" text-anchor="middle">1</text>
  <circle cx="900" cy="360" r="18" fill="#0a3d62" /><text x="900" y="367" font-family="Heebo" font-size="18" font-weight="800" fill="#fdf6e3" text-anchor="middle">2</text>
  <circle cx="1050" cy="340" r="18" fill="#0a3d62" /><text x="1050" y="347" font-family="Heebo" font-size="18" font-weight="800" fill="#fdf6e3" text-anchor="middle">3</text>
  <circle cx="1150" cy="380" r="18" fill="#0a3d62" /><text x="1150" y="387" font-family="Heebo" font-size="18" font-weight="800" fill="#fdf6e3" text-anchor="middle">4</text>

  <!-- Hero stop card -->
  <rect x="700" y="470" width="520" height="100" rx="12" fill="url(#cardBg)" stroke="#e9c46a" stroke-width="2" />
  <circle cx="1180" cy="520" r="22" fill="#0a3d62" /><text x="1180" y="528" font-family="Heebo" font-size="20" font-weight="800" fill="#fdf6e3" text-anchor="middle">2</text>
  <text x="1140" y="510" font-family="Heebo" font-size="24" font-weight="800" text-anchor="end" fill="#0a3d62" direction="rtl">⛵ נידרי · לפקדה</text>
  <text x="1140" y="545" font-family="Heebo" font-size="15" text-anchor="end" fill="#5a6e60" direction="rtl">15.4 ק"מ · 2ש'35ד'</text>

  <!-- Smaller cards -->
  <rect x="700" y="590" width="520" height="80" rx="12" fill="#ffffff" stroke="#e9c46a" stroke-width="1" />
  <circle cx="1180" cy="630" r="18" fill="#0a3d62" /><text x="1180" y="637" font-family="Heebo" font-size="16" font-weight="800" fill="#fdf6e3" text-anchor="middle">3</text>
  <text x="1140" y="620" font-family="Heebo" font-size="20" font-weight="700" text-anchor="end" fill="#0a3d62" direction="rtl">🏝️ מגניסי · ואתי</text>
  <text x="1140" y="650" font-family="Heebo" font-size="13" text-anchor="end" fill="#5a6e60" direction="rtl">8.3 ק"מ · 1ש'25ד'</text>

  <rect x="700" y="690" width="520" height="80" rx="12" fill="#ffffff" stroke="#e9c46a" stroke-width="1" />
  <circle cx="1180" cy="730" r="18" fill="#0a3d62" /><text x="1180" y="737" font-family="Heebo" font-size="16" font-weight="800" fill="#fdf6e3" text-anchor="middle">4</text>
  <text x="1140" y="720" font-family="Heebo" font-size="20" font-weight="700" text-anchor="end" fill="#0a3d62" direction="rtl">🌊 קסטוס · האי השקט</text>
  <text x="1140" y="750" font-family="Heebo" font-size="13" text-anchor="end" fill="#5a6e60" direction="rtl">12.6 ק"מ · 2ש'</text>

  <rect x="700" y="790" width="520" height="80" rx="12" fill="#ffffff" stroke="#e9c46a" stroke-width="1" />
  <circle cx="1180" cy="830" r="18" fill="#0a3d62" /><text x="1180" y="837" font-family="Heebo" font-size="16" font-weight="800" fill="#fdf6e3" text-anchor="middle">5</text>
  <text x="1140" y="820" font-family="Heebo" font-size="20" font-weight="700" text-anchor="end" fill="#0a3d62" direction="rtl">🏛️ קיוני · איתקה</text>
  <text x="1140" y="850" font-family="Heebo" font-size="13" text-anchor="end" fill="#5a6e60" direction="rtl">5.5 ק"מ · 55ד'</text>

  <!-- CTA pill -->
  <rect x="780" y="900" width="360" height="48" rx="24" fill="url(#goldGrad)" />
  <text x="960" y="932" font-family="Heebo" font-size="20" font-weight="800"
        text-anchor="middle" fill="#0a3d62" direction="rtl">▶ הפלגה וירטואלית</text>
</svg>
